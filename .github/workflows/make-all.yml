name: make-all

on:
  pull_request:
    paths:
      - ".github/workflows/make-all.yml"
      - "elixir/**"
      - "AGENTS.md"
      - "SPEC.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/make-all.yml"
      - "elixir/**"
      - "AGENTS.md"
      - "SPEC.md"

jobs:
  make-all:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise tools
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Verify make all
        env:
          COVERAGE_POLICY_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
          COVERAGE_POLICY_BASE_REF_MODE: ${{ github.event_name == 'pull_request' && 'enforce' || 'skip_without_base' }}
        run: make all
